<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CHECK POINT VIP</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
}

body{

  font-family:Arial,sans-serif;

  background:
  url("https://quick1.clickbet88vip-sultan.com/desktop.webp")
  no-repeat center center fixed;

  background-size:cover;

  overflow-x:hidden;

  color:white;
}

/* TOP AREA */
.top-banner{

  width:100%;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  padding-top:25px;

  margin-bottom:-40px;

  position:relative;

  z-index:5;
}

/* LOGO VIP */
.top-logo{

  width:95px;

  margin-bottom:10px;
}

/* BANNER */
.banner-img{

  width:78%;

  max-width:320px;
}

/* WRAPPER */
.wrapper{

  width:100%;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:
    20px
    20px
    120px;
}

/* MAIN BOX */
.main-box{

  width:100%;

  max-width:340px;

  border-radius:28px;

  overflow:hidden;

  background:
    rgba(0, 10, 35, 0.78);

  backdrop-filter:blur(10px);

  border:2px solid #d6aa5d;

  box-shadow:
    0 0 18px rgba(214,170,93,0.35);

  text-align:center;
}

/* CONTENT */
.content{

  padding:
    42px
    22px;
}

/* LOGO */
.logo{

  margin-bottom:20px;
}

.logo img{

  width:170px;
}

/* TITLE */
.title{

  font-size:16px;

  font-weight:bold;

  margin-bottom:28px;

  color:white;

  text-shadow:
    0 0 10px rgba(0,180,255,0.7);
}

/* INPUT */
.input-box{

  width:100%;

  padding:17px;

  border:none;

  outline:none;

  border-radius:18px;

  font-size:14px;

  margin-bottom:28px;

  text-align:center;
}

/* BUTTON */
.btn{

  width:72%;

  padding:15px;

  border-radius:45px;

  border:4px solid #d6aa5d;

  cursor:pointer;

  font-size:15px;

  font-weight:bold;

  color:#f6d98b;

  background:
    linear-gradient(
      180deg,
      #111111 0%,
      #000000 50%,
      #1a1a1a 100%
    );

  box-shadow:
    0 0 10px rgba(214,170,93,0.5),
    inset 0 2px 5px rgba(255,255,255,0.08);

  text-shadow:
    0 0 8px rgba(255,215,120,0.7);

  transition:0.3s;

  position:relative;

  overflow:hidden;
}

/* EFEK KILAU */
.btn::before{

  content:"";

  position:absolute;

  top:4px;

  left:10%;

  width:80%;

  height:12px;

  border-radius:30px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.35),
      transparent
    );
}

/* HOVER */
.btn:hover{

  transform:scale(1.03);

  box-shadow:
    0 0 18px rgba(255,215,120,0.8),
    inset 0 2px 5px rgba(255,255,255,0.15);
}

/* RESULT */
#result{

  margin-top:25px;

  font-size:18px;
}

/* MOBILE */
@media(max-width:768px){

  .wrapper{

    padding-top:10px;
  }

  .main-box{

    max-width:320px;
  }

  .content{

    padding:
      38px
      20px;
  }

  .logo img{

    width:160px;
  }

  .title{

    font-size:15px;
  }

  .btn{

    width:75%;

    font-size:14px;
  }

  .banner-img{

    width:82%;
  }

  .top-logo{

    width:85px;
  }

}

/* DESKTOP */
@media(min-width:1024px){

  .main-box{

    max-width:380px;
  }

}

</style>
</head>

<body>

<!-- TOP -->
<div class="top-banner">

  <img
    class="top-logo"
    src="https://cdn.it-cg.group/cbvipmoneysite/uploads/kUXxhyccQK5IqfFFgHSXlkJ4iUJConb7N2BSRTLA.webp"
  >

  <img
    class="banner-img"
    src="https://cdn.it-cg.group/cbvipmoneysite/uploads/I7AnkOXPJk9RLIWhN7liARtSMB44HT2p5SEs0ULF.webp"
  >

</div>

<!-- BOX -->
<div class="wrapper">

  <div class="main-box">

    <div class="content">

      <!-- LOGO -->
      <div class="logo">

        <img
          src="https://king2.cb88-rtpslot.com/new/logo.webp"
        >

      </div>

      <!-- TITLE -->
      <div class="title">
        CHECK POINT VIP
      </div>

      <!-- INPUT -->
      <input
        type="text"
        class="input-box"
        placeholder="Enter User ID"
        id="username"
      >

      <!-- BUTTON -->
      <button
        class="btn"
        onclick="checkPoint()"
      >
        CHECK SEKARANG
      </button>

      <!-- RESULT -->
      <div id="result"></div>

    </div>

  </div>

</div>

<script>

function checkPoint(){

  var username =
    document.getElementById("username").value;

  if(username == ""){

    alert("Masukkan Username");

    return;
  }

  document.getElementById("result").innerHTML =
    "🔥 Sedang mengecek point...";
}

</script>

</body>
</html>
